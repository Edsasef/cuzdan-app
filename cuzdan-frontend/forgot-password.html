<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Şifremi Unuttum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkbg: '#0B0F19', darkcard: '#131C2E' } } } }
    </script>
</head>
<body class="bg-darkbg min-h-screen flex flex-col justify-center items-center font-sans text-slate-200 antialiased p-4">
    
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-darkcard border border-slate-800/80 p-8 rounded-3xl shadow-2xl space-y-6 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-[1px] bg-gradient-to-r from-transparent via-sky-500/50 to-transparent"></div>
        
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-black text-white tracking-wider font-mono">ŞIFREMI UNUTTUM</h1>
            <p class="text-xs text-slate-400 px-4">Hesabınıza kayıtlı e-posta adresinizi girin, size şifre sıfırlama bağlantısı gönderelim.</p>
        </div>

        <form id="forgotForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-Posta Adresi</label>
                <input type="email" id="email" required placeholder="ornek@domain.com" class="w-full bg-darkbg border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 text-sm transition-all">
            </div>
            <button type="submit" class="w-full bg-white hover:bg-slate-100 text-slate-950 font-bold py-3 px-4 rounded-xl transition-all text-sm flex justify-center items-center tracking-wide">
                Bağlantı Gönder
            </button>
        </form>

        <div class="text-center pt-2">
            <a href="index.html" class="text-xs font-semibold text-slate-400 hover:text-white transition-all inline-flex items-center gap-1">
                Giriş Ekranına Dön
            </a>
        </div>
    </div>

    <script>
        // Supabase kütüphanesini dinamik olarak sayfaya dahil ediyoruz
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
        document.head.appendChild(script);

        let supabaseClient;
        
        // Kütüphane yüklendiğinde çalışacak alan
        script.onload = () => {
            const SUPABASE_URL = "https://psoqdrasppeugrslphdx.supabase.co";
            // Kopyaladığın o upuzun publishable key'i buraya yapıştırıyoruz:
            const SUPABASE_KEY = "sb_publishable_kRdd3_Op6eFgOETkbs7bMw_kDOQx..."; 
            
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        };

        // Ekrana Şık Toast Bildirimi Basan Fonksiyon
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm ${type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-400' : 'bg-rose-950/90 border-rose-500/30 text-rose-400'}`;
            toast.innerHTML = `<span class="text-sm font-medium text-slate-200">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { 
                toast.classList.add('translate-x-full', 'opacity-0'); 
                setTimeout(() => toast.remove(), 300); 
            }, 4000);
        }

        // Form Gönderildiğinde Tetiklenen Alan
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const button = e.target.querySelector('button');
            
            if (!supabaseClient) {
                showToast('Supabase kütüphanesi henüz yüklenemedi, lütfen bir saniye bekleyip tekrar deneyin.', 'error');
                return;
            }

            button.disabled = true;
            button.classList.add('opacity-70', 'cursor-not-allowed');
            button.innerHTML = `Gönderiliyor...`;

            try {
                // İstek backend'e gitmeden direkt kullanıcının tarayıcısından Supabase Auth'a uçuyor (Güvenli Yol)
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: 'http://127.0.0.1:5500/reset-password.html',
                });

                if (error) {
                    // Supabase'den bir hata dönerse (örn: geçersiz mail formatı vb.)
                    showToast(error.message || 'Bir sorun oluştu.', 'error');
                } else {
                    // İşlem başarılıysa
                    showToast('Sıfırlama bağlantısı e-posta adresinize gönderildi! Mail kutunuzu kontrol edin.', 'success');
                    document.getElementById('forgotForm').reset();
                }
            } catch (error) {
                console.error(error);
                showToast('Bağlantı kurulurken beklenmedik bir hata oluştu.', 'error');
            } finally {
                button.disabled = false;
                button.classList.remove('opacity-70', 'cursor-not-allowed');
                button.innerHTML = 'Bağlantı Gönder';
            }
        });
    </script>
</body>
</html>
