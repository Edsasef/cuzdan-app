<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Şifremi Unuttum</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#080B11] min-h-screen flex flex-col justify-center items-center font-sans antialiased p-4 selection:bg-amber-500/30 selection:text-white">
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-[#111622] border border-slate-800/60 p-8 rounded-[2rem] shadow-[0_0_50px_rgba(0,0,0,0.8)] space-y-6 relative overflow-hidden backdrop-blur-md">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-amber-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[2px] bg-gradient-to-r from-transparent via-amber-500 to-transparent"></div>
        
        <div class="text-center space-y-2">
            <div class="inline-flex p-3 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-2xl mb-1 shadow-[0_0_15px_rgba(245,158,11V,0.1)]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.011 5.893L9.002 17.5a1.5 1.5 0 0 1-1.06.44H6.5a1.5 1.5 0 0 1-1.5-1.5v-1.44a1.5 1.5 0 0 1 .44-1.061l2.517-2.517a6 6 0 0 1 7.805-7.805Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5h.008v.008H16.5V10.5Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-widest font-mono uppercase">Şifremi Unuttum</h1>
            <p class="text-xs text-slate-400 max-w-[280px] mx-auto">E-posta adresinizi girin, size şifre sıfırlama bağlantısı gönderelim.</p>
        </div>

        <form id="forgotForm" class="space-y-4 pt-2">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">E-Posta Adresi</label>
                <input type="email" id="email" required placeholder="ornek@domain.com" class="w-full bg-[#090D14] border border-slate-800/80 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:bg-[#0c121d] text-sm transition-all shadow-inner">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_20px_rgba(245,158,11,0.25)] hover:shadow-[0_4px_25px_rgba(245,158,11,0.4)] active:scale-[0.98] transition-all text-sm tracking-widest uppercase mt-4">
                Bağlantı Gönder
            </button>
        </form>

        <div class="text-center pt-4 border-t border-slate-800/40">
            <a href="index.html" class="text-xs font-semibold text-slate-400 hover:text-white transition-all inline-flex items-center gap-1.5 hover:underline">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
                Giriş Ekranına Dön
            </a>
        </div>
    </div>

    <script>
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
        document.head.appendChild(script);

        let supabaseClient;
        
        script.onload = () => {
            const SUPABASE_URL = "https://psoqdrasppeugrslphdx.supabase.co";
            const SUPABASE_KEY = "sb_publishable_kRdd3_Op6eFgOETkbs7bMw_kDOQx..."; 
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm ${type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-400' : 'bg-rose-950/90 border-rose-500/30 text-rose-400'}`;
            toast.innerHTML = `<span class="text-sm font-medium text-slate-200">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const button = e.target.querySelector('button');
            
            if (!supabaseClient) {
                showToast('Altyapı yükleniyor, bir saniye bekleyin...', 'error');
                return;
            }

            button.disabled = true;
            button.className = "w-full bg-slate-800 text-slate-400 font-bold py-3.5 px-4 rounded-xl text-sm tracking-widest uppercase mt-4 cursor-not-allowed flex justify-center items-center gap-2";
            button.innerHTML = `<svg class="animate-spin h-5 w-5 text-amber-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Gönderiliyor...`;

            try {
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: 'http://127.0.0.1:5500/reset-password.html',
                });

                if (error) {
                    showToast(error.message || 'Bir sorun oluştu.', 'error');
                } else {
                    showToast('Sıfırlama bağlantısı e-posta adresinize gönderildi!', 'success');
                    document.getElementById('forgotForm').reset();
                }
            } catch (error) {
                showToast('Beklenmedik bir hata oluştu.', 'error');
            } finally {
                button.disabled = false;
                button.className = "w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_20px_rgba(245,158,11,0.25)] hover:shadow-[0_4px_25px_rgba(245,158,11,0.4)] active:scale-[0.98] transition-all text-sm tracking-widest uppercase mt-4";
                button.innerHTML = 'Bağlantı Gönder';
            }
        });
    </script>
</body>
</html>
