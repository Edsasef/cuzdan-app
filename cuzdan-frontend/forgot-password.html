<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Şifremi Unuttum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0B0F19',
                        darkcard: '#131C2E',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkbg min-h-screen flex flex-col justify-center items-center font-sans text-slate-200 antialiased p-4">

    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div
        class="w-full max-w-md bg-darkcard border border-slate-800/80 p-8 rounded-3xl shadow-2xl space-y-6 relative overflow-hidden">

        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-[1px] bg-gradient-to-r from-transparent via-sky-500/50 to-transparent">
        </div>

        <div class="text-center space-y-2">
            <div class="flex justify-center text-sky-400 mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-10 h-10">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.011 5.893L9.002 17.5a1.5 1.5 0 0 1-1.06.44H6.5a1.5 1.5 0 0 1-1.5-1.5v-1.44a1.5 1.5 0 0 1 .44-1.061l2.517-2.517a6 6 0 0 1 7.805-7.805Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5h.008v.008H16.5V10.5Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-wider font-mono">ŞİFREMİ UNUTTUM</h1>
            <p class="text-xs text-slate-400 px-4">Hesabınıza kayıtlı e-posta adresinizi girin, size şifre sıfırlama
                bağlantısı gönderelim.</p>
        </div>

        <form id="forgotForm" class="space-y-4">
            <div>
                <label for="email"
                    class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-Posta
                    Adresi</label>
                <input type="email" id="email" required placeholder="ornek@domain.com"
                    class="w-full bg-darkbg border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 text-sm transition-all">
            </div>

            <button type="submit"
                class="w-full bg-white hover:bg-slate-100 text-slate-950 font-bold py-3 px-4 rounded-xl transition-all text-sm flex justify-center items-center tracking-wide">
                Bağlantı Gönder
            </button>
        </form>

        <div class="text-center pt-2">
            <a href="index.html"
                class="text-xs font-semibold text-slate-400 hover:text-white transition-all inline-flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-3.5 h-3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Giriş Ekranına Dön
            </a>
        </div>
    </div>

    <script>
        // Toast Bildirim Fonksiyonu
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm`;

            if (type === 'success') {
                toast.className += ' bg-emerald-950/90 border-emerald-500/30 text-emerald-400';
                toast.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span class="text-sm font-medium text-slate-200">${message}</span>`;
            } else {
                toast.className += ' bg-rose-950/90 border-rose-500/30 text-rose-400';
                toast.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg><span class="text-sm font-medium text-slate-200">${message}</span>`;
            }

            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Form Gönderme Olayı
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const button = e.target.querySelector('button');

            // Yükleniyor Animasyonu (Butonu kilitle)
            button.disabled = true;
            button.classList.add('opacity-70', 'cursor-not-allowed');
            button.innerHTML = `
        <svg class="animate-spin h-5 w-5 text-slate-950 inline-block mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Gönderiliyor...
    `;

            try {
                // Az önce Vercel'e pushladığın gerçek endpoint'e POST isteği atıyoruz
                const response = await fetch('https://cuzdan-finans.vercel.app/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Sıfırlama bağlantısı e-posta adresinize gönderildi! Mail kutunuzu kontrol edin.', 'success');
                    // Formu temizle
                    document.getElementById('forgotForm').reset();
                } else {
                    showToast(data.detail || 'Bir sorun oluştu. E-posta adresinizi kontrol edin.', 'error');
                }

            } catch (error) {
                console.error('Hata:', error);
                showToast('Sunucuya bağlanırken bir hata oluştu.', 'error');
            } finally {
                // İşlem bitince butonu eski canlı haline geri getir
                button.disabled = false;
                button.classList.remove('opacity-70', 'cursor-not-allowed');
                button.innerHTML = 'Bağlantı Gönder';
            }
        });
    </script>
</body>

</html>
