<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Yeni Şifre Oluştur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkbg: '#0B0F19', darkcard: '#131C2E' } } } }
    </script>
</head>
<body class="bg-darkbg min-h-screen flex flex-col justify-center items-center font-sans text-slate-200 p-4">

    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-darkcard border border-slate-800/80 p-8 rounded-3xl shadow-2xl space-y-6 relative">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-black text-white tracking-wider font-mono">YENİ ŞİFRE BELİRLE</h1>
            <p class="text-xs text-slate-400">Hesabınız için yeni ve güçlü bir şifre giriniz.</p>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Yeni Şifre</label>
                <input type="password" id="newPassword" required placeholder="••••••••" 
                    class="w-full bg-darkbg border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 text-sm">
            </div>
            <button type="submit" class="w-full bg-white hover:bg-slate-100 text-slate-950 font-bold py-3 px-4 rounded-xl text-sm">
                Şifreyi Güncelle
            </button>
        </form>
    </div>

    <script>
        // Toast fonksiyonu ve backend bağlantısı buraya gelecek...
        // Kullanıcı linkten geldiğinde Supabase URL'e bir access_token gömer, frontend o tokenı yakalayıp şifreyi günceller.
    </script>
</body>
</html>
