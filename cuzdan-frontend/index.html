<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0B0F19',   // Derin ve loş ana arka plan
                        darkcard: '#131C2E', // Gece mavisi lüks kart rengi
                        accent: '#38BDF8',   // Detaylar için hafif buz mavisi
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkbg flex items-center justify-center min-h-screen p-4 font-sans text-slate-200">
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>
    <div class="w-full max-w-md bg-darkcard border border-slate-800 rounded-2xl shadow-2xl p-8">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-sky-500/10 text-sky-400 mb-3 border border-sky-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 12a2.25 2.25 0 0 0-2.25-2.25H15a3 3 0 1 1-6 0H5.25A2.25 2.25 0 0 0 3 12m18 0v6A2.25 2.25 0 0 1 18.75 20H5.25A2.25 2.25 0 0 1 3 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 9m18 0V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v3" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Cüzdan<span class="text-sky-400">Finans</span></h1>
            <p class="text-slate-400 text-sm mt-1">Giriş yaparak bütçenizi yönetmeye başlayın.</p>
        </div>

        <form id="loginForm" class="space-y-5">

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-Posta
                    Adresi</label>
                <input type="email" id="email" required placeholder="isim@ornek.com"
                    class="w-full bg-darkbg border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all text-sm">
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Şifre</label>
                    <a href="forgot-password.html" class="text-xs font-semibold text-sky-400 hover:text-sky-300 transition-all">Şifremi Unuttum</a>
                </div>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full bg-darkbg border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all text-sm">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember"
                    class="w-4 h-4 rounded bg-darkbg border-slate-700 text-sky-500 focus:ring-sky-500 focus:ring-offset-darkcard">
                <label for="remember" class="ml-2 text-xs text-slate-400 select-none">Beni hatırla</label>
            </div>

            <button type="submit"
                class="w-full bg-white hover:bg-slate-100 text-slate-950 font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-white/5 flex items-center justify-center gap-2 text-sm">
                Giriş Yap
            </button>
        </form>

        <div class="text-center mt-6 pt-5 border-t border-slate-800">
            <p class="text-sm text-slate-400">
                Henüz hesabınız yok mu?
                <a href="register.html" class="text-sky-400 hover:text-sky-300 font-medium transition-colors ml-1">Kayıt
                    Ol</a>
            </p>
        </div>

    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');

            // Yeni bir bildirim kutusu oluşturuyoruz
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm`;

            // Tipine göre renk ayarları (Başarılı ise Yeşil, Başarısız ise Kırmızı)
            if (type === 'success') {
                toast.className += ' bg-emerald-950/90 border-emerald-500/30 text-emerald-400';
                toast.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-sm font-medium text-slate-200">${message}</span>
        `;
            } else {
                toast.className += ' bg-rose-950/90 border-rose-500/30 text-rose-400';
                toast.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
            <span class="text-sm font-medium text-slate-200">${message}</span>
        `;
            }

            container.appendChild(toast);

            // Slayt efekti ile ekrana getirme
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            }, 10);

            // 3 saniye sonra kutuyu yumuşakça silme
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const button = e.target.querySelector('button');

            button.disabled = true;
            button.innerHTML = 'Giriş Yapılıyor...';

            try {
                const response = await fetch('https://cuzdan-finans.vercel.app/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        id: "614798e3-0ec3-448a-a9da-df04ee202613"
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Token ile birlikte giriş yapan e-postayı da tarayıcı hafızasına alıyoruz
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('userEmail', email); // Bu satırı ekle

                    showToast('Giriş başarılı! Yönlendiriliyorsunuz...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                }
                else {
                showToast(data.detail || 'E-posta veya ID hatalı!', 'error');
            }

        } catch (error) {
            console.error('Hata:', error);
            alert('Sunucuya bağlanırken bir hata oluştu.');
        } finally {
            button.disabled = false;
            button.innerHTML = 'Giriş Yap';
        }
        });
    </script>
</body>

</html>
