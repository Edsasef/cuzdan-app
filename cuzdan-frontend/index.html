<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#080B11] min-h-screen flex flex-col justify-center items-center font-sans antialiased p-4 selection:bg-sky-500/30 selection:text-white">
    
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-[#111622] border border-slate-800/60 p-8 rounded-[2rem] shadow-[0_0_50px_rgba(0,0,0,0.8)] space-y-6 relative overflow-hidden backdrop-blur-md">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-sky-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[2px] bg-gradient-to-r from-transparent via-sky-500 to-transparent"></div>
        
        <div class="text-center space-y-2">
            <div class="inline-flex p-3 bg-sky-500/10 border border-sky-500/20 text-sky-400 rounded-2xl mb-1 shadow-[0_0_15px_rgba(56,189,248,0.1)]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-widest font-mono uppercase">Giriş Yap</h1>
            <p class="text-xs text-slate-400 max-w-[280px] mx-auto">Finansal durumunuzu yönetmeye hemen başlayın.</p>
        </div>

        <form id="loginForm" class="space-y-4 pt-2">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">E-Posta Adresi</label>
                <input type="email" id="email" required placeholder="ornek@domain.com" class="w-full bg-[#090D14] border border-slate-800/80 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:bg-[#0c121d] text-sm transition-all shadow-inner">
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Şifre</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-[#090D14] border border-slate-800/80 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 focus:bg-[#0c121d] text-sm transition-all shadow-inner">
            </div>
            
            <div class="flex items-center justify-end pt-1">
                <a href="forgot-password.html" class="text-xs font-semibold text-sky-400 hover:text-sky-300 hover:underline transition-all tracking-wide">Şifremi Unuttum?</a>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-400 hover:to-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_20px_rgba(56,189,248,0.25)] hover:shadow-[0_4px_25px_rgba(56,189,248,0.4)] active:scale-[0.98] transition-all text-sm tracking-widest uppercase mt-2">
                Giriş Yap
            </button>
        </form>

        <div class="text-center pt-4 border-t border-slate-800/40">
            <p class="text-xs text-slate-500 tracking-wide">Hesabınız yok mu? <a href="register.html" class="text-sky-400 font-bold hover:text-sky-300 transition-colors ml-1">Kayıt Ol</a></p>
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm ${type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-400' : 'bg-rose-950/90 border-rose-500/30 text-rose-400'}`;
            toast.innerHTML = `<span class="text-sm font-medium text-slate-200">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = e.target.querySelector('button');
            
            button.disabled = true;
            button.innerHTML = `Giriş Yapılıyor...`;

            try {
                const response = await fetch('https://cuzdan-finans.vercel.app/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('userEmail', email);
                    showToast('Giriş başarılı!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                } else {
                    showToast(data.detail || 'E-posta veya şifre hatalı.', 'error');
                }
            } catch (error) {
                showToast('Sunucu hatası oluştu.', 'error');
            } finally {
                button.disabled = false;
                button.innerHTML = 'Giriş Yap';
            }
        });
    </script>
</body>
</html>
