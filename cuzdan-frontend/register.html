<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkbg: '#0B0F19', darkcard: '#131C2E' } } } }
    </script>
</head>
<body class="bg-darkbg min-h-screen flex flex-col justify-center items-center font-sans text-slate-200 antialiased p-4">
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-darkcard border border-slate-800/80 p-8 rounded-3xl shadow-2xl space-y-6 relative overflow-hidden">
        <div class="text-center space-y-2">
            <h1 class="text-2xl font-black text-white tracking-wider font-mono">KAYIT OL</h1>
            <p class="text-xs text-slate-400">Yeni bir hesap oluşturun ve hemen bütçenizi yönetin.</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-Posta Adresi</label>
                <input type="email" id="email" required placeholder="ornek@domain.com" class="w-full bg-darkbg border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 text-sm">
            </div>
            <button type="submit" class="w-full bg-white hover:bg-slate-100 text-slate-950 font-bold py-3 px-4 rounded-xl text-sm flex justify-center items-center tracking-wide">
                Hesap Oluştur
            </button>
        </form>
        <div class="text-center pt-2">
            <p class="text-xs text-slate-500">Zaten hesabınız var mı? <a href="index.html" class="text-sky-400 font-bold hover:underline">Giriş Yap</a></p>
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm ${type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-400' : 'bg-rose-950/90 border-rose-500/30 text-rose-400'}`;
            toast.innerHTML = `<span class="text-sm font-medium text-slate-200">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const button = e.target.querySelector('button');
            
            button.disabled = true;
            button.classList.add('opacity-70', 'cursor-not-allowed');
            button.innerHTML = `<svg class="animate-spin h-5 w-5 text-slate-950 inline-block mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Hesap Oluşturuluyor...`;

            const randomId = crypto.randomUUID(); // Otomatik artan / Benzersiz UUID üretimi

            try {
                const response = await fetch('https://cuzdan-finans.vercel.app/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, id: randomId })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz.', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    showToast(data.detail || 'Kayıt sırasında bir sorun oluştu.', 'error');
                }
            } catch (error) {
                showToast('Sunucu hatası yaşandı.', 'error');
            } finally {
                button.disabled = false;
                button.classList.remove('opacity-70', 'cursor-not-allowed');
                button.innerHTML = 'Hesap Oluştur';
            }
        });
    </script>
</body>
</html>
