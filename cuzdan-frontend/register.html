<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0B0F19',
                        darkcard: '#131C2E',
                        accent: '#38BDF8',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkbg flex items-center justify-center min-h-screen p-4 font-sans text-slate-200">
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>
    <div class="w-full max-w-md bg-darkcard border border-slate-800 rounded-2xl shadow-2xl p-8">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-sky-500/10 text-sky-400 mb-3 border border-sky-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0zM4 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 10.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Hesap <span class="text-sky-400">Oluştur</span>
            </h1>
            <p class="text-slate-400 text-sm mt-1">Hızlıca kayıt olup bütçenizi kontrol altına alın.</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Ad Soyad</label>
                <input type="text" id="fullName" required placeholder="İsim Soyisim"
                    class="w-full bg-darkbg border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">E-Posta
                    Adresi</label>
                <input type="email" id="email" required placeholder="isim@ornek.com"
                    class="w-full bg-darkbg border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Şifre</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full bg-darkbg border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all text-sm">
            </div>

            <button type="submit"
                class="w-full bg-white hover:bg-slate-100 text-slate-950 font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-white/5 flex items-center justify-center gap-2 text-sm mt-2">
                Hesap Oluştur
            </button>
        </form>

        <div class="text-center mt-6 pt-5 border-t border-slate-800">
            <p class="text-sm text-slate-400">
                Zaten hesabınız var mı?
                <a href="index.html" class="text-sky-400 hover:text-sky-300 font-medium transition-colors ml-1">Giriş
                    Yap</a>
            </p>
        </div>

    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');

            // Yeni bir bildirim kutusu oluşturuyoruz
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm`;

            // Tipine göre renk ayarları (Başarılı ise Yeşil, Başarısız ise Kırmızı)
            if (type === 'success') {
                toast.className += ' bg-emerald-950/90 border-emerald-500/30 text-emerald-400';
                toast.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-sm font-medium text-slate-200">${message}</span>
        `;
            } else {
                toast.className += ' bg-rose-950/90 border-rose-500/30 text-rose-400';
                toast.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
            <span class="text-sm font-medium text-slate-200">${message}</span>
        `;
            }

            container.appendChild(toast);

            // Slayt efekti ile ekrana getirme
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            }, 10);

            // 3 saniye sonra kutuyu yumuşakça silme
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = e.target.querySelector('button');

            button.disabled = true;
            button.innerHTML = 'Hesap Oluşturuluyor...';

            // Butona basıldığı an tarayıcıya rastgele, benzersiz bir UUID ürettiriyoruz
            const randomId = crypto.randomUUID();

            try {
                const response = await fetch('https://cuzdan-finans.vercel.app/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        id: randomId // Her seferinde otomatik değişen benzersiz ID
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz.', 'success');

                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    showToast(data.detail || 'Kayıt sırasında bir sorun oluştu.', 'error');
                }
            } catch (error) {
                alert('Sunucu hatası.');
            } finally {
                button.disabled = false;
                button.innerHTML = 'Hesap Oluştur';
            }
        });
    </script>
</body>

</html>
