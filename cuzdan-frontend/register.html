<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cüzdan Finans - Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#080B11] min-h-screen flex flex-col justify-center items-center font-sans antialiased p-4 selection:bg-emerald-500/30 selection:text-white">
    <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-[#111622] border border-slate-800/60 p-8 rounded-[2rem] shadow-[0_0_50px_rgba(0,0,0,0.8)] space-y-6 relative overflow-hidden backdrop-blur-md">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[2px] bg-gradient-to-r from-transparent via-emerald-500 to-transparent"></div>

        <div class="text-center space-y-2">
            <div class="inline-flex p-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-2xl mb-1 shadow-[0_0_15px_rgba(16,185,129,0.1)]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-widest font-mono uppercase">Kayıt Ol</h1>
            <p class="text-xs text-slate-400 max-w-[280px] mx-auto">Yeni bir hesap oluşturun ve hemen bütçenizi yönetin.</p>
        </div>

        <form id="registerForm" class="space-y-4 pt-2">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Ad Soyad</label>
                <input type="text" id="full_name" required placeholder="İsim Soyisim" class="w-full bg-[#090D14] border border-slate-800/80 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:bg-[#0c121d] text-sm transition-all shadow-inner">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">E-Posta Adresi</label>
                <input type="email" id="email" required placeholder="ornek@domain.com" class="w-full bg-[#090D14] border border-slate-800/80 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:bg-[#0c121d] text-sm transition-all shadow-inner">
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Şifre</label>
                <input type="password" id="password" required placeholder="En az 6 karakter" class="w-full bg-[#090D14] border border-slate-800/80 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:bg-[#0c121d] text-sm transition-all shadow-inner">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_20px_rgba(16,185,129,0.25)] hover:shadow-[0_4px_25px_rgba(16,185,129,0.4)] active:scale-[0.98] transition-all text-sm tracking-widest uppercase mt-4">
                Hesap Oluştur
            </button>
        </form>

        <div class="text-center pt-4 border-t border-slate-800/40">
            <p class="text-xs text-slate-500 tracking-wide">Zaten hesabınız var mı? <a href="index.html" class="text-emerald-400 font-bold hover:text-emerald-300 transition-colors ml-1">Giriş Yap</a></p>
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all duration-300 transform translate-x-full opacity-0 pointer-events-auto max-w-sm ${type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-400' : 'bg-rose-950/90 border-rose-500/30 text-rose-400'}`;
            toast.innerHTML = `<span class="text-sm font-medium text-slate-200">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = e.target.querySelector('button');
            
            button.disabled = true;
            button.innerHTML = `Hesap Oluşturuluyor...`;

            try {
                const response = await fetch('https://cuzdan-finans.vercel.app/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        full_name: fullName, // JSON paketine ekledik
                        email: email, 
                        password: password 
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz.', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    showToast(data.detail || 'Kayıt sırasında bir sorun oluştu.', 'error');
                }
            } catch (error) {
                showToast('Sunucu hatası yaşandı.', 'error');
            } finally {
                button.disabled = false;
                button.innerHTML = 'Hesap Oluştur';
            }
        });
    </script>
</body>
</html>
